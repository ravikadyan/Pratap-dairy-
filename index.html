<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pratap Dairy — Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --gold: #b8860b;
  --gold-light: #d4a017;
  --gold-pale: #fdf6e3;
  --cream: #fffdf7;
  --white: #ffffff;
  --border: #e8dfc8;
  --muted: #8a7a5a;
  --green: #2e7d52;
  --card-shadow: 0 2px 12px rgba(26,18,8,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

/* HEADER */
.header{background:var(--ink);padding:14px 16px 10px;text-align:center;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px;}
.header-logo{font-family:"Playfair Display",serif;font-size:1.4rem;font-weight:800;color:var(--gold-light);letter-spacing:.5px;}
.header-sub{font-size:.63rem;color:#c8b88a;letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.header-links{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:5px;}
.header-phone{font-size:.72rem;color:#8a7a5a;text-decoration:none;display:flex;align-items:center;gap:3px;}
.insta-link{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.7rem;font-weight:600;
  color:#fff;text-decoration:none;
  border-radius:20px;
  padding:3px 10px 3px 8px;
  background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  transition:all .2s;
}
.insta-link:active{opacity:.85;}
.insta-svg{width:13px;height:13px;fill:#fff;display:block;}
.gold-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* TABS */
.cat-tabs{display:flex;overflow-x:auto;background:var(--ink);padding:0 8px 10px;gap:6px;scrollbar-width:none;position:sticky;top:72px;z-index:90;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:5px 13px;font-size:.7rem;font-weight:600;white-space:nowrap;cursor:pointer;border-radius:20px;color:#8a7a5a;border:1px solid #333;transition:all .2s;flex-shrink:0;}
.cat-tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}

/* BODY */
.menu-body{padding:0 10px 120px;}

/* SECTION */
.cat-section{margin-top:16px;scroll-margin-top:118px;}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 2px;}
.cat-header h2{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:var(--ink);}
.cat-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}

/* FEATURED CARDS — TRUE SQUARE */
.featured-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.featured-card{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:var(--card-shadow);border:1px solid var(--border);}
.feat-img-wrap{position:relative;width:100%;padding-top:100%;overflow:hidden;background:#f5efe0;}
.feat-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.feat-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.4rem;background:linear-gradient(135deg,#f5ede0,#faf4e8);}
.feat-body{padding:8px 8px 9px;}
.feat-name{font-size:.78rem;font-weight:700;color:var(--ink);line-height:1.25;}
.feat-note{font-size:.63rem;color:var(--muted);margin-top:1px;}
.feat-variants{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.variant-pill{font-size:.6rem;font-weight:600;background:var(--gold-pale);color:var(--gold);border:1px solid #e8d5a0;border-radius:20px;padding:2px 6px;white-space:nowrap;}
.feat-desc{font-size:.6rem;color:var(--muted);margin-top:3px;line-height:1.35;}
.feat-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.feat-price{font-size:.85rem;font-weight:700;color:var(--gold);}

/* LIST — 2 COL */
.list-grid{display:grid;grid-template-columns:1fr 1fr;background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--card-shadow);}
.list-item{display:flex;align-items:flex-start;padding:9px 8px;border-bottom:1px solid var(--border);gap:4px;}
.list-item:nth-child(odd){border-right:1px solid var(--border);}
.list-item:nth-last-child(-n+2){border-bottom:none;}
.list-left{flex:1;min-width:0;}
.list-name{font-size:.72rem;font-weight:600;color:var(--ink);line-height:1.25;}
.list-note{font-size:.6rem;color:var(--muted);margin-top:1px;}
.list-variants{margin-top:3px;}
.list-variant-line{font-size:.61rem;color:var(--gold);font-weight:600;line-height:1.4;}
.list-right-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.list-price{font-size:.72rem;font-weight:700;color:var(--gold);white-space:nowrap;}

/* BUTTONS */
.add-btn{width:24px;height:24px;background:var(--ink);color:var(--gold);border:none;border-radius:6px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-ctrl{display:flex;align-items:center;gap:2px;}
.qty-btn{width:22px;height:22px;background:var(--gold);color:var(--ink);border:none;border-radius:5px;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:.78rem;font-weight:700;min-width:16px;text-align:center;}
.fadd{width:28px;height:28px;background:var(--ink);color:var(--gold);border:none;border-radius:8px;font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fqty-btn{width:26px;height:26px;background:var(--gold);color:var(--ink);border:none;border-radius:7px;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fqty-num{font-size:.82rem;font-weight:700;min-width:18px;text-align:center;}

/* FLOATING MENU BUTTON */
.float-menu-btn{
  position:fixed;right:14px;bottom:80px;
  width:52px;height:52px;
  background:var(--ink);
  border:2px solid var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:190;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  transition:transform .2s;
}
.float-menu-btn:active{transform:scale(.92);}
.float-menu-btn svg{width:22px;height:22px;fill:var(--gold);}
.float-menu-btn.hidden{display:none;}

/* FLOATING MENU DRAWER */
.menu-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:290;}
.menu-drawer-overlay.open{display:block;}
.menu-drawer{
  position:fixed;right:0;top:0;bottom:0;
  width:72vw;max-width:280px;
  background:var(--ink);
  z-index:295;
  transform:translateX(100%);
  transition:transform .28s ease;
  overflow-y:auto;
  padding:20px 0 40px;
  border-left:2px solid var(--gold);
}
.menu-drawer.open{transform:translateX(0);}
.drawer-title{
  font-family:"Playfair Display",serif;
  font-size:1rem;font-weight:700;
  color:var(--gold-light);
  padding:0 18px 14px;
  border-bottom:1px solid #333;
  margin-bottom:8px;
}
.drawer-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 18px;
  cursor:pointer;
  border-bottom:1px solid #222;
  transition:background .15s;
}
.drawer-item:active{background:#2a1f0a;}
.drawer-emoji{font-size:1rem;width:22px;text-align:center;}
.drawer-name{font-size:.82rem;font-weight:600;color:#e8d5a0;line-height:1.2;}
.drawer-close{
  position:absolute;top:14px;right:14px;
  background:none;border:none;color:#8a7a5a;
  font-size:1.3rem;cursor:pointer;
}

/* CART BAR */
.cart-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);padding:13px 20px;z-index:200;cursor:pointer;align-items:center;justify-content:space-between;border-top:2px solid var(--gold);}
.cart-bar.show{display:flex;}
.cb-left{font-size:.78rem;color:#c8b88a;}
.cb-left strong{color:var(--gold-light);font-size:.95rem;}
.cb-right{font-family:"Playfair Display",serif;font-size:.88rem;color:var(--gold);font-weight:700;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.6);z-index:300;}
.overlay.open{display:block;}
.cart-modal{position:fixed;bottom:0;left:0;right:0;background:var(--cream);border-radius:20px 20px 0 0;padding:20px 16px 30px;z-index:400;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease;border-top:3px solid var(--gold);}
.cart-modal.open{transform:translateY(0);}
.modal-title{font-family:"Playfair Display",serif;font-size:1.15rem;font-weight:700;color:var(--ink);margin-bottom:12px;}
.close-btn{position:absolute;top:18px;right:16px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);}
.cart-item-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
.ci-name{flex:1;font-size:.8rem;font-weight:600;}
.ci-price{font-size:.8rem;font-weight:700;color:var(--gold);min-width:50px;text-align:right;}
.cart-divider{height:1px;background:var(--border);margin:8px 0;}
.cart-total{display:flex;justify-content:space-between;padding:8px 0 4px;font-weight:700;font-size:.95rem;}
.cart-total span:last-child{color:var(--gold);}
.form-label{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin:10px 0 4px;}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.86rem;background:var(--white);outline:none;font-family:"DM Sans",sans-serif;color:var(--ink);}
.form-input:focus{border-color:var(--gold);}
textarea.form-input{height:54px;resize:none;}
.place-btn{width:100%;padding:13px;background:var(--ink);color:var(--gold);border:2px solid var(--gold);border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:14px;font-family:"Playfair Display",serif;letter-spacing:.5px;}
.place-btn:disabled{opacity:.5;cursor:not-allowed;}
.success-wrap{display:none;text-align:center;padding:28px 10px;}
.success-wrap.show{display:block;}
.success-icon{font-size:3rem;margin-bottom:10px;}
.success-title{font-family:"Playfair Display",serif;font-size:1.25rem;color:var(--green);}
.success-msg{color:var(--muted);font-size:.83rem;margin-top:8px;line-height:1.5;}
.order-more-btn{margin-top:18px;padding:11px 26px;background:var(--ink);color:var(--gold);border:2px solid var(--gold);border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:"Playfair Display",serif;}
</style>
</head>

const EMOJI = {street_food:"🌮",main_course:"🍛",chaap_tikka:"🔥",bread:"🫓",thali:"🍱",biryani:"🍚",china_express:"🥡",sandwich:"🥪",salad_raita:"🥗",shakes:"🥤",sweets:"🍮"};

// ── BUILD DRAWER ──
function buildDrawer() {
  const list = document.getElementById("drawerList");
  CATS.forEach(cat => {
    const div = document.createElement("div");
    div.className = "drawer-item";
    div.innerHTML = `<span class="drawer-emoji">${EMOJI[cat.id]||"🍽"}</span><span class="drawer-name">${cat.name}</span>`;
    div.onclick = () => {
      closeDrawer();
      setTimeout(() => { scrollToSection(cat.id); }, 280);
    };
    list.appendChild(div);
  });
}

function openDrawer() {
  document.getElementById("drawerOverlay").className = "menu-drawer-overlay open";
  document.getElementById("menuDrawer").className = "menu-drawer open";
}
function closeDrawer() {
  document.getElementById("drawerOverlay").className = "menu-drawer-overlay";
  document.getElementById("menuDrawer").className = "menu-drawer";
}

// ── BUILD MENU ──
function buildMenu() {
  const tabs = document.getElementById("catTabs");
  const body = document.getElementById("menuBody");

  CATS.forEach((cat, idx) => {
    const tab = document.createElement("div");
    tab.id = "tab-"+cat.id;
    tab.className = "cat-tab"+(idx===0?" active":"");
    tab.textContent = (EMOJI[cat.id]||"🍽")+" "+cat.name;
    tab.onclick = () => scrollToSection(cat.id);
    tabs.appendChild(tab);

    const sec = document.createElement("div");
    sec.className = "cat-section"; sec.id = "sec-"+cat.id;
    sec.innerHTML = `<div class="cat-header"><h2>${EMOJI[cat.id]||"🍽"} ${cat.name}</h2><div class="cat-line"></div></div>`;

    const featured = cat.items.filter(i=>i.featured);
    const rest = cat.items.filter(i=>!i.featured);

    if(featured.length) {
      const grid = document.createElement("div");
      grid.className = "featured-grid";
      featured.forEach(item => {
        const card = document.createElement("div");
        card.className = "featured-card";
        const imgHtml = item.photo
          ? `<div class="feat-img-wrap"><img src="${item.photo}" alt="${item.name}" loading="lazy"></div>`
          : `<div class="feat-img-wrap"><div class="feat-img-placeholder">${EMOJI[cat.id]||"🍽"}</div></div>`;
        const noteHtml = item.note ? `<div class="feat-note">${item.note}</div>` : "";
        const descHtml = item.desc ? `<div class="feat-desc">${item.desc}</div>` : "";
        const vHtml = item.variants
          ? `<div class="feat-variants">${item.variants.map(v=>`<span class="variant-pill">${v}</span>`).join("")}</div>`
          : "";
        const priceHtml = (!item.variants) ? `<div class="feat-price">₹${item.price}</div>` : `<div></div>`;
        card.innerHTML = `${imgHtml}
          <div class="feat-body">
            <div class="feat-name">${item.name}</div>${noteHtml}${descHtml}${vHtml}
            <div class="feat-footer">${priceHtml}
              <div id="ctrl-${item.id}"><button class="fadd" onclick="addItem('${cat.id}','${item.id}',${item.price||0})">+</button></div>
            </div>
          </div>`;
        grid.appendChild(card);
      });
      sec.appendChild(grid);
    }

    if(rest.length) {
      const listGrid = document.createElement("div");
      listGrid.className = "list-grid";
      const padded = rest.length%2!==0 ? [...rest,null] : rest;
      padded.forEach(item => {
        const cell = document.createElement("div");
        cell.className = "list-item";
        if(!item){cell.style.cssText="background:transparent;border:none;";listGrid.appendChild(cell);return;}
        const noteHtml = item.note?`<div class="list-note">${item.note}</div>`:"";
        const priceBlock = item.variants
          ? item.variants.map(v=>`<div class="list-variant-line">${v}</div>`).join("")
          : `<div class="list-price">₹${item.price}</div>`;
        cell.innerHTML = `
          <div class="list-left">
            <div class="list-name">${item.name}</div>${noteHtml}
            <div class="list-variants">${priceBlock}</div>
          </div>
          <div class="list-right-col">
            <div id="ctrl-${item.id}"><button class="add-btn" onclick="addItem('${cat.id}','${item.id}',${item.price||0})">+</button></div>
          </div>`;
        listGrid.appendChild(cell);
      });
      sec.appendChild(listGrid);
    }
    body.appendChild(sec);
  });

  // Intersection observer for tabs — updates active tab as user scrolls
  const obs = new IntersectionObserver(entries=>{
    if(isProgrammaticScroll) return; // don't fight manual scroll-to-section
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace("sec-","");
        setActiveTab(id);
      }
    });
  },{threshold:.2});
  document.querySelectorAll(".cat-section").forEach(s=>obs.observe(s));
}

// Scroll to a section with correct offset (avoid sticky header/tabs hiding it)
let isProgrammaticScroll = false;
let scrollTimeout = null;
function scrollToSection(catId) {
  const sec = document.getElementById("sec-"+catId);
  if(!sec) return;
  const header = document.querySelector(".header");
  const tabs = document.querySelector(".cat-tabs");
  const offset = (header?.offsetHeight||0) + (tabs?.offsetHeight||0) + 8;
  const y = sec.getBoundingClientRect().top + window.pageYOffset - offset;

  isProgrammaticScroll = true;
  setActiveTab(catId);
  window.scrollTo({ top: y, behavior: "smooth" });

  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(()=>{ isProgrammaticScroll = false; }, 900);
}

// Update active tab + center it horizontally without affecting page scroll
function setActiveTab(catId) {
  document.querySelectorAll(".cat-tab").forEach(t=>t.classList.remove("active"));
  const t = document.getElementById("tab-"+catId);
  if(!t) return;
  t.classList.add("active");
  // Horizontal-only scroll inside the tabs container
  const tabsBar = document.getElementById("catTabs");
  const tabLeft = t.offsetLeft;
  const targetLeft = tabLeft - (tabsBar.offsetWidth/2) + (t.offsetWidth/2);
  tabsBar.scrollTo({ left: targetLeft, behavior: "smooth" });
}

// Hide float btn when cart bar shows, show when no cart
function updateFloatBtn() {
  const hasCart = Object.keys(cart).length > 0;
  document.getElementById("floatMenuBtn").style.bottom = hasCart ? "72px" : "16px";
}

function findItem(catId,itemId){const cat=CATS.find(c=>c.id===catId);return cat?cat.items.find(i=>i.id===itemId):null;}
function getCatId(itemId){for(const cat of CATS)if(cat.items.find(i=>i.id===itemId))return cat.id;return "";}
function isFeat(itemId){for(const cat of CATS){const it=cat.items.find(i=>i.id===itemId);if(it)return !!it.featured;}return false;}

function addItem(catId,itemId,price){
  const item=findItem(catId,itemId);if(!item)return;
  cart[itemId]={item,qty:1};
  renderCtrl(itemId,catId);updateBar();updateFloatBtn();
}
function changeQty(itemId,catId,delta){
  if(!cart[itemId])return;
  cart[itemId].qty+=delta;
  if(cart[itemId].qty<=0)delete cart[itemId];
  renderCtrl(itemId,catId);updateBar();updateFloatBtn();
  if(document.getElementById("cartModal").classList.contains("open"))renderCartItems();
}
function renderCtrl(itemId,catId){
  const ctrl=document.getElementById("ctrl-"+itemId);if(!ctrl)return;
  const entry=cart[itemId];const feat=isFeat(itemId);
  if(!entry){
    ctrl.innerHTML=feat
      ?`<button class="fadd" onclick="addItem('${catId}','${itemId}',0)">+</button>`
      :`<button class="add-btn" onclick="addItem('${catId}','${itemId}',0)">+</button>`;
  } else {
    ctrl.innerHTML=feat
      ?`<div class="qty-ctrl"><button class="fqty-btn" onclick="changeQty('${itemId}','${catId}',-1)">−</button><span class="fqty-num">${entry.qty}</span><button class="fqty-btn" onclick="changeQty('${itemId}','${catId}',1)">+</button></div>`
      :`<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${itemId}','${catId}',-1)">−</button><span class="qty-num">${entry.qty}</span><button class="qty-btn" onclick="changeQty('${itemId}','${catId}',1)">+</button></div>`;
  }
}
function updateBar(){
  const count=Object.values(cart).reduce((s,e)=>s+e.qty,0);
  const total=Object.values(cart).reduce((s,e)=>s+(e.item.price*e.qty),0);
  document.getElementById("cartCount").textContent=count;
  document.getElementById("cartBarTotal").textContent="₹"+total;
  document.getElementById("cartBar").className="cart-bar"+(count>0?" show":"");
}
function openCart(){
  document.getElementById("overlay").className="overlay open";
  document.getElementById("cartModal").className="cart-modal open";
  if(TABLE_ID)document.getElementById("custTable").value=TABLE_ID;
  renderCartItems();
}
function closeCart(){
  document.getElementById("overlay").className="overlay";
  document.getElementById("cartModal").className="cart-modal";
}
function renderCartItems(){
  const container=document.getElementById("cartItems");container.innerHTML="";
  let total=0;
  Object.values(cart).forEach(({item,qty})=>{
    total+=item.price*qty;
    const row=document.createElement("div");row.className="cart-item-row";
    const cid=getCatId(item.id);
    row.innerHTML=`<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${item.id}','${cid}',-1)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${item.id}','${cid}',1)">+</button></div><div class="ci-name">${item.name}</div><div class="ci-price">₹${item.price*qty}</div>`;
    container.appendChild(row);
  });
  document.getElementById("cartTotal").textContent="₹"+total;
}
async function placeOrder(){
  const name=document.getElementById("custName").value.trim();
  const phone=document.getElementById("custPhone").value.trim();
  const table=document.getElementById("custTable").value.trim();
  const note=document.getElementById("custNote").value.trim();
  if(!name){alert("Please enter your name");return;}
  if(!/^[6-9]\d{9}$/.test(phone)){alert("Please enter a valid 10-digit mobile number");return;}
  if(!Object.keys(cart).length){alert("Cart is empty!");return;}
  const btn=document.getElementById("placeBtn");
  btn.disabled=true;btn.textContent="Placing Order...";
  const items=Object.values(cart).map(({item,qty})=>({id:item.id,name:item.name,price:item.price,qty,subtotal:item.price*qty}));
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  try{
    if(SHEET_URL)await fetch(SHEET_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({customerName:name,customerPhone:phone,tableId:table||"Walk-in",items,total,notes:note,restaurantId:"pratap_dairy",timestamp:new Date().toISOString()}),mode:"no-cors"});
    document.getElementById("cartContent").style.display="none";
    document.getElementById("successScreen").className="success-wrap show";
    document.getElementById("successMsg").textContent=`Thank you ${name}! Order of ₹${total} confirmed. We'll prepare it fresh! 🙏`;
  }catch(e){
    alert("Order failed. Please try again.");
    btn.disabled=false;btn.textContent="Place Order";
  }
}
function resetOrder(){
  cart={};
  CATS.forEach(cat=>cat.items.forEach(item=>{
    const ctrl=document.getElementById("ctrl-"+item.id);if(!ctrl)return;
    if(item.featured)ctrl.innerHTML=`<button class="fadd" onclick="addItem('${cat.id}','${item.id}',${item.price||0})">+</button>`;
    else ctrl.innerHTML=`<button class="add-btn" onclick="addItem('${cat.id}','${item.id}',${item.price||0})">+</button>`;
  }));
  updateBar();updateFloatBtn();
  document.getElementById("cartContent").style.display="";
  document.getElementById("successScreen").className="success-wrap";
  ["custName","custPhone","custNote"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("placeBtn").disabled=false;
  document.getElementById("placeBtn").textContent="Place Order";
  closeCart();
}

buildDrawer();
buildMenu();
</script>
</body>
</html>
